name: Auto-merge Dependabot PRs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const headSha = context.payload.workflow_run.head_sha;

            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open' });

            for (const pr of prs) {
              if (pr.user?.login !== 'dependabot[bot]') continue;
              if (pr.draft) continue;
              if (pr.head.sha !== headSha) continue;

              await github.rest.pulls.createReview({
                owner, repo, pull_number: pr.number, event: 'APPROVE',
              });

              // Queue the squash merge instead of merging immediately. GitHub
              // runs it once every required check passes (CodeQL / Vercel /
              // type-check), so this no longer races the still-pending Vercel
              // deployment - an immediate merge here returns 405 "Required
              // status check Vercel is pending" and fails the job.
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $id, mergeMethod: SQUASH }) {
                      clientMutationId
                    }
                  }`,
                  { id: pr.node_id },
                );
              } catch (e) {
                core.warning(`Could not enable auto-merge for #${pr.number}: ${e.message}`);
              }
            }

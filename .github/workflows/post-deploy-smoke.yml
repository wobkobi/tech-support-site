name: Post-deploy smoke

# Vercel emits deployment_status events to GitHub. These only fire for the
# workflow file on the DEFAULT branch (main), so this is inert until Phase 0
# merges to main; after that, both preview and production deploys are smoked.
on:
  deployment_status:

permissions:
  contents: read

jobs:
  smoke:
    # Only after the deployment actually succeeded, and only when Vercel gave us
    # a URL to hit.
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment_url != ''
    runs-on: ubuntu-latest

    env:
      DEPLOY_URL: ${{ github.event.deployment_status.environment_url }}
      # Must match the DEPLOYED environment's value so admin pages authenticate.
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
      # Vercel "Protection Bypass for Automation" secret; empty/ignored when
      # Deployment Protection is off.
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout at the deployed commit
        uses: actions/checkout@v4
        with:
          # Discovered routes + package.json version must match the deployed
          # build, so check out the exact SHA Vercel deployed.
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      # The smoke test only needs puppeteer + tsx; skip postinstall (prisma
      # generate) so no database or engine download is required.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # --ignore-scripts skipped puppeteer's own browser download, so install it
      # explicitly (a no-op on a cache hit).
      - name: Ensure Chromium is installed
        run: npx puppeteer browsers install chrome

      - name: Health probe
        run: |
          set -euo pipefail
          expected="$(node -p "require('./package.json').version")"
          echo "Expecting version $expected at $DEPLOY_URL/api/health"
          for attempt in 1 2 3 4 5; do
            body="$(curl -fsS --max-time 20 \
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET:-}" \
              "$DEPLOY_URL/api/health" || true)"
            echo "Attempt $attempt: $body"
            if echo "$body" | grep -q '"ok":true' && echo "$body" | grep -q "\"version\":\"$expected\""; then
              echo "Health OK - version $expected is live."
              exit 0
            fi
            sleep 5
          done
          echo "Health probe failed: did not see ok:true + version $expected"
          exit 1

      - name: Remote smoke
        run: npx tsx scripts/smoke-test.ts --url "$DEPLOY_URL"
